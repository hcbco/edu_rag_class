# MySQL 配置
[mysql]
host = localhost
# 实际工作中不会去用root账号，尤其是开发人员，尤其是生产环境
user = edu_rag
password = 123456
database = subjects_kg

# Redis 配置
[redis]
host = localhost
port = 6379
password = 1234
