# Milvus 配置
[milvus]
host = localhost
port = 19530
database_name = itcast
collection_name = edurag_bj31


# LLM 配置
[llm]
model = qwen3.7-max
dashscope_base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

# 检索参数配置
[retrieval]
parent_chunk_size = 1200
child_chunk_size = 300
chunk_overlap = 60
retrieval_k = 20
candidate_m = 5

# 应用配置
[app]
valid_sources = ["ai", "java", "test", "ops", "bigdata"]
customer_service_phone = 10086

# BERT 模型训练与推理配置
[bert]
# 预训练模型名称
pre_trained_model_name = bert-base-chinese
# 模型保存目录名
model_path = bert_query_classifier
# 分类标签数量
num_labels = 2
# 文本最大长度
max_length = 128
# 训练集和验证集划分比例
test_size = 0.2
# 随机种子
random_state = 42
# 训练输出目录
output_dir = bert_results
# 最多保存的检查点数量
save_total_limit = 1
# 训练轮次
num_train_epochs = 3
# 训练批次大小
per_device_train_batch_size = 8
# 评估批次大小
per_device_eval_batch_size = 8
# 学习率预热步数
warmup_steps = 500
# 权重衰减系数
weight_decay = 0.01
# 日志目录
logging_dir = ./bert_logs
# 日志记录步数
logging_steps = 10
# 评估策略
evaluation_strategy = epoch
# 保存策略
save_strategy = epoch
# 训练结束后是否加载最佳模型
load_best_model_at_end = True
# 判断最佳模型的指标
metric_for_best_model = eval_loss
# 是否使用FP16混合精度训练
fp16 = False

# 日志配置
[logger]
log_file = /Users/itheima/Documents/黑马/讲课/就业班/edu-rag/北京31期/学生端/04-代码/00001.项目代码_课上/integrated_qa_system/logs/app.log
# 控制台日志级别，可选值: DEBUG, INFO, WARNING, ERROR
console_level = INFO