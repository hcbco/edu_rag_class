<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传智教育EduRAG智慧问答系统</title>
    <!-- 引入 Font Awesome 图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --primary-dark: #4834d4;
            --accent: #00cec9;
            --accent-light: #81ecec;
            --neon-pink: #fd79a8;
            --neon-blue: #74b9ff;
            --neon-green: #55efc4;
            --bg: #0a0a1a;
            --bg-card: rgba(15, 15, 35, 0.85);
            --bg-glass: rgba(20, 20, 50, 0.6);
            --bg-input: rgba(25, 25, 55, 0.8);
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --border: rgba(108, 92, 231, 0.2);
            --border-glow: rgba(108, 92, 231, 0.5);
            --glass-blur: blur(20px);
            --glow-primary: 0 0 20px rgba(108, 92, 231, 0.3), 0 0 40px rgba(108, 92, 231, 0.1);
            --glow-accent: 0 0 20px rgba(0, 206, 201, 0.3), 0 0 40px rgba(0, 206, 201, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                         'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 深色模式（默认就是深色，light mode 反转） */
        body.dark-mode {
            --bg: #f0f2f5;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-glass: rgba(255, 255, 255, 0.7);
            --bg-input: rgba(240, 240, 250, 0.9);
            --text: #1a1a2e;
            --text-dim: #6b7280;
            --border: rgba(108, 92, 231, 0.15);
            --border-glow: rgba(108, 92, 231, 0.3);
            --glow-primary: 0 0 20px rgba(108, 92, 231, 0.15);
            --glow-accent: 0 0 20px rgba(0, 206, 201, 0.15);
        }

        /* ===== 背景粒子动画 ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 206, 201, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(253, 121, 168, 0.08) 0%, transparent 50%);
            z-index: 0;
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        body.dark-mode::before {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 206, 201, 0.05) 0%, transparent 50%);
        }

        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        /* 浮动粒子 */
        body::after {
            content: '';
            position: fixed;
            width: 2px; height: 2px;
            border-radius: 50%;
            background: var(--primary-light);
            box-shadow:
                calc(10vw) calc(20vh) 0 1px rgba(108,92,231,0.3),
                calc(30vw) calc(60vh) 0 0.5px rgba(0,206,201,0.4),
                calc(70vw) calc(15vh) 0 1.5px rgba(253,121,168,0.3),
                calc(85vw) calc(75vh) 0 1px rgba(116,185,255,0.3),
                calc(50vw) calc(40vh) 0 0.5px rgba(162,155,254,0.4),
                calc(15vw) calc(80vh) 0 1px rgba(85,239,196,0.3),
                calc(90vw) calc(35vh) 0 1.5px rgba(108,92,231,0.2),
                calc(40vw) calc(90vh) 0 0.5px rgba(0,206,201,0.3),
                calc(65vw) calc(50vh) 0 1px rgba(253,121,168,0.2),
                calc(25vw) calc(10vh) 0 1.5px rgba(116,185,255,0.2);
            z-index: 0;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0.6; }
            25% { opacity: 1; }
            50% { transform: translateY(-30px) translateX(15px); opacity: 0.6; }
            75% { opacity: 1; }
            100% { transform: translateY(0) translateX(0); opacity: 0.6; }
        }

        /* ===== Header ===== */
        header {
            position: relative;
            z-index: 20;
            padding: 0.9rem 1.5rem;
            text-align: center;
            background: linear-gradient(135deg,
                rgba(108, 92, 231, 0.9) 0%,
                rgba(72, 52, 212, 0.9) 50%,
                rgba(0, 206, 201, 0.8) 100%);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 30px rgba(108, 92, 231, 0.3);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,255,255,0.05) 50%,
                transparent 100%);
            animation: headerShine 4s ease-in-out infinite;
        }

        @keyframes headerShine {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transform: translateY(-50%) scale(1.15) rotate(15deg);
        }

        /* ===== Container ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.25rem;
            display: flex;
            flex: 1;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .chat-container {
            display: flex;
            height: calc(100vh - 120px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--glow-primary), 0 25px 50px rgba(0,0,0,0.3);
            transition: var(--transition);
            position: relative;
        }

        /* 边框发光动画 */
        .chat-container::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius);
            padding: 1px;
            background: linear-gradient(135deg,
                var(--primary), var(--accent), var(--neon-pink), var(--primary));
            background-size: 400% 400%;
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderGlow 8s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 300px;
            padding: 1.25rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            transition: var(--transition);
        }

        .search-box {
            padding: 0.65rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            transition: var(--transition);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 206, 201, 0.15), var(--glow-accent);
        }

        .search-box::placeholder { color: var(--text-dim); }

        .session-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .new-session-btn, .clear-history-btn {
            background: var(--bg-input);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex: 1;
        }

        .new-session-btn:hover, .clear-history-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }

        .new-session-btn:active, .clear-history-btn:active {
            transform: translateY(0) scale(0.97);
        }

        .history-title {
            font-weight: 600;
            font-size: 0.78rem;
            margin-bottom: 0.75rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .history-list { flex: 1; overflow-y: auto; }

        .history-item {
            padding: 0.75rem 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 10px;
            margin-bottom: 0.4rem;
            background: var(--bg-input);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .history-item::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }

        .history-item:hover {
            border-color: var(--border-glow);
            background: rgba(108, 92, 231, 0.1);
            transform: translateX(4px);
            box-shadow: var(--glow-primary);
        }

        .history-item:hover::after { opacity: 1; }

        .history-question {
            font-weight: 600;
            font-size: 0.83rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            margin-bottom: 0.15rem;
        }

        .history-answer {
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.75rem;
        }

        .session-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        /* ===== Main Content ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-history {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            scroll-behavior: smooth;
            transition: var(--transition);
        }

        /* 滚动条 */
        .chat-history::-webkit-scrollbar,
        .history-list::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-track,
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb,
        .history-list::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            border-radius: 10px;
        }

        /* ===== Messages ===== */
        .message {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            animation: msgIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
                filter: blur(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            background: linear-gradient(135deg, var(--primary), var(--accent)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: avatarPulse 3s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .user-message .avatar {
            background: linear-gradient(135deg, var(--neon-pink), #e84393);
            box-shadow: 0 0 12px rgba(253, 121, 168, 0.4);
        }

        .user-message .avatar::after {
            background: linear-gradient(135deg, var(--neon-pink), #e84393) border-box;
        }

        .message-content {
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            max-width: 80%;
            word-break: break-word;
            position: relative;
            font-size: 0.92rem;
            line-height: 1.7;
            transition: var(--transition);
        }

        .message-content:hover {
            transform: translateY(-1px);
        }

        .user-message { align-self: flex-end; }

        .user-message .message-header {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .user-message .avatar {
            margin-right: 0;
            margin-left: 0.5rem;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.25);
        }

        .user-message .message-content:hover {
            box-shadow: 0 6px 25px rgba(108, 92, 231, 0.4);
        }

        .system-message { align-self: flex-start; }

        .system-message .message-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            color: var(--text);
            align-self: flex-start;
            border-top-left-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .system-message .message-content:hover {
            border-color: var(--border-glow);
            box-shadow: 0 6px 25px rgba(0,0,0,0.15), var(--glow-primary);
        }

        .message-status {
            display: flex;
            align-items: center;
            margin-top: 0.25rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            justify-content: flex-end;
        }

        /* 代码块 */
        .message-content pre {
            background: rgba(10, 10, 30, 0.9);
            color: #cdd6f4;
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
            margin: 0.6rem 0;
            font-size: 0.84rem;
            border: 1px solid rgba(108, 92, 231, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        .message-content code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .message-content :not(pre) > code {
            background: rgba(108, 92, 231, 0.15);
            color: var(--accent);
            padding: 0.15rem 0.45rem;
            border-radius: 5px;
            font-size: 0.85em;
        }

        .user-message .message-content :not(pre) > code {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .message-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 0.5rem 0;
        }

        /* ===== Typing Indicator ===== */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 1rem 1.25rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-top-left-radius: 4px;
            margin-bottom: 1.5rem;
            box-shadow: var(--glow-primary);
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: typingDot 1.5s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }
        .typing-indicator span:nth-child(2) {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation-delay: 0.15s;
        }
        .typing-indicator span:nth-child(3) {
            background: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink);
            animation-delay: 0.3s;
            margin-right: 0;
        }

        @keyframes typingDot {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* ===== Input Area ===== */
        .chat-input-container {
            padding: 1rem 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
            background: var(--bg-glass);
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .source-filter {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .source-filter select {
            margin-left: 0.5rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 0.8rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .source-filter select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 206, 201, 0.15);
        }

        .input-tools {
            display: flex;
            margin-bottom: 0.5rem;
            gap: 0.25rem;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.35rem 0.5rem;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .tool-btn:hover {
            background: rgba(108, 92, 231, 0.1);
            color: var(--primary-light);
            text-shadow: 0 0 8px var(--primary);
        }

        .input-group {
            display: flex;
            position: relative;
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius) 0 0 var(--radius);
            font-size: 0.92rem;
            resize: none;
            height: 48px;
            max-height: 150px;
            overflow-y: auto;
            background: var(--bg-input);
            color: var(--text);
            transition: var(--transition);
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15),
                        inset 0 0 20px rgba(108, 92, 231, 0.05);
        }

        .chat-input::placeholder { color: var(--text-dim); }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 0 var(--radius) var(--radius) 0;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .send-btn:hover::before {
            transform: translateX(100%);
        }

        .send-btn:hover {
            box-shadow: var(--glow-primary), var(--glow-accent);
            transform: translateX(2px);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            background: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .send-btn:disabled::before { display: none; }

        /* ===== Quick Replies ===== */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .quick-reply-btn {
            padding: 0.35rem 0.9rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .quick-reply-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }

        .quick-reply-btn:hover {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }

        .quick-reply-btn:hover::before { opacity: 1; }

        .quick-reply-btn span,
        .quick-reply-btn {
            position: relative;
            z-index: 1;
        }

        /* ===== Loading Overlay ===== */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 26, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            visibility: hidden;
            backdrop-filter: blur(8px);
            transition: var(--transition);
        }

        body.dark-mode .loading-overlay {
            background: rgba(240, 242, 245, 0.6);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
            position: relative;
        }

        .spinner::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: var(--neon-pink);
            border-left-color: var(--neon-blue);
            animation: spin 1.2s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container { padding: 0.6rem; }

            .chat-container {
                flex-direction: column;
                height: calc(100vh - 90px);
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 160px;
                padding: 0.75rem;
            }

            .message-content { max-width: 92%; }

            header h1 { font-size: 1rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>传智教育EduRAG智慧问答系统</h1>
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <div class="container">
        <div class="chat-container">
            <div class="sidebar">
                <!-- 搜索框 -->
                <input type="text" class="search-box" id="searchBox" placeholder="搜索历史会话...">
                
                <!-- 会话控制按钮 -->
                <div class="session-controls">
                    <button class="new-session-btn" id="newSessionBtn">
                        <i class="fas fa-plus"></i> 新会话
                    </button>
                    <button class="clear-history-btn" id="clearHistoryBtn">
                        <i class="fas fa-trash"></i> 清除历史
                    </button>
                </div>
                <div class="history-title">
                    <i class="fas fa-history"></i> 历史会话
                </div>
                <div class="history-list" id="historyList">
                    <!-- 历史会话将动态添加到这里 -->
                </div>
                <div class="session-info" id="sessionInfo"></div>
            </div>

            <div class="main-content">
                <div class="chat-history" id="chatHistory">
                    <!-- 消息将动态添加到这里 -->
                    <div class="message system-message">
                        <div class="message-header">
                            <div class="avatar">智</div>
                            <span>智能助手</span>
                        </div>
                        <div class="message-content">
                            您好！我是智能问答助手，有什么我可以帮您的吗？
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="source-filter">
                        <label for="sourceFilter">学科类别：</label>
                        <select id="sourceFilter">
                            <option value="">全部</option>
                            <!-- 学科类别选项将动态添加 -->
                        </select>
                    </div>
                    <div class="input-tools">
                        <button class="tool-btn" id="emojiBtn" title="表情">
                            <i class="far fa-smile"></i>
                        </button>
                        <button class="tool-btn" id="imageBtn" title="图片">
                            <i class="far fa-image"></i>
                        </button>
                        <button class="tool-btn" id="fileBtn" title="文件">
                            <i class="far fa-file"></i>
                        </button>
                    </div>
                    <div class="input-group">
                        <textarea class="chat-input" id="chatInput" placeholder="请输入您的问题..."
                            rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" spellcheck="false"></textarea>
                        <button class="send-btn" id="sendBtn">
                            <i class="fas fa-paper-plane"></i> 发送
                        </button>
                    </div>
                    <!-- 快捷回复 -->
                    <div class="quick-replies" id="quickReplies">
                        <button class="quick-reply-btn">什么是人工智能？</button>
                        <button class="quick-reply-btn">机器学习有哪些算法？</button>
                        <button class="quick-reply-btn">如何学习Python？</button>
                    </div>
                </div>

                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentSessionId = null; // 当前会话 ID
        let isResponseInProgress = false; // 是否正在处理响应
        let socket = null; // WebSocket 连接
        let isDarkMode = false; // 是否深色模式

        // DOM 元素
        const chatHistory = document.getElementById('chatHistory'); // 聊天历史容器
        const chatInput = document.getElementById('chatInput'); // 输入框
        const sendBtn = document.getElementById('sendBtn'); // 发送按钮
        const sourceFilter = document.getElementById('sourceFilter'); // 学科过滤器
        const historyList = document.getElementById('historyList'); // 历史列表
        const sessionInfo = document.getElementById('sessionInfo'); // 会话信息
        const newSessionBtn = document.getElementById('newSessionBtn'); // 新会话按钮
        const clearHistoryBtn = document.getElementById('clearHistoryBtn'); // 清除历史按钮
        const loadingOverlay = document.getElementById('loadingOverlay'); // 加载遮罩
        const themeToggle = document.getElementById('themeToggle'); // 主题切换按钮
        const searchBox = document.getElementById('searchBox'); // 搜索框
        const quickReplies = document.getElementById('quickReplies'); // 快捷回复
        const quickReplyBtns = quickReplies.querySelectorAll('.quick-reply-btn'); // 快捷回复按钮
        const emojiBtn = document.getElementById('emojiBtn'); // 表情按钮
        const imageBtn = document.getElementById('imageBtn'); // 图片按钮
        const fileBtn = document.getElementById('fileBtn'); // 文件按钮

        // API URL 前缀，根据部署环境调整
        const API_BASE_URL = ''; // 如果 API 和前端在同一域，可以留空

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', async () => {
            // 检查本地存储中的主题设置
            isDarkMode = localStorage.getItem('darkMode') === 'true';
            updateTheme();

            // 创建新会话
            await createNewSession();

            // 加载学科类别
            await loadSources();

            // 事件监听器
            sendBtn.addEventListener('click', sendMessage); // 发送按钮点击事件
            chatInput.addEventListener('keydown', (e) => { // 输入框键盘事件
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            newSessionBtn.addEventListener('click', createNewSession); // 新会话按钮点击事件
            clearHistoryBtn.addEventListener('click', clearHistory); // 清除历史按钮点击事件
            themeToggle.addEventListener('click', toggleTheme); // 主题切换按钮点击事件
            searchBox.addEventListener('input', searchHistory); // 搜索框输入事件

            // 快捷回复按钮点击事件
            quickReplyBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    chatInput.value = btn.textContent;
                    chatInput.style.height = 'auto';
                    chatInput.style.height = chatInput.scrollHeight + 'px';
                    sendMessage();
                });
            });

            // 工具按钮点击事件
            emojiBtn.addEventListener('click', () => alert('表情选择功能开发中'));
            imageBtn.addEventListener('click', () => alert('图片上传功能开发中'));
            fileBtn.addEventListener('click', () => alert('文件上传功能开发中'));
        });

        // 切换主题
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            updateTheme();
        }

        // 更新主题
        function updateTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        // 搜索历史会话
        function searchHistory() {
            const searchTerm = searchBox.value.toLowerCase();
            const historyItems = historyList.querySelectorAll('.history-item');

            historyItems.forEach(item => {
                const question = item.querySelector('.history-question').textContent.toLowerCase();
                const answer = item.querySelector('.history-answer').textContent.toLowerCase();

                if (question.includes(searchTerm) || answer.includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 创建新会话
        async function createNewSession() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE_URL}/api/create_session`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('创建会话失败');
                }

                const data = await response.json();
                currentSessionId = data.session_id; // 更新当前会话 ID

                // 更新会话信息
                sessionInfo.textContent = `会话ID: ${currentSessionId.slice(0, 8)}...`;

                // 清空聊天历史
                clearChatHistory();

                // 加载会话历史
                await loadHistory();

            } catch (error) {
                console.error('创建会话错误:', error);
                alert('创建会话失败，请刷新页面重试');
            } finally {
                hideLoading();
            }
        }

        // 加载学科类别
        async function loadSources() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/sources`);

                if (!response.ok) {
                    throw new Error('获取学科类别失败');
                }

                const data = await response.json();

                // 清空现有选项
                sourceFilter.innerHTML = '<option value="">全部</option>';

                // 添加学科类别选项
                data.sources.forEach(source => {
                    const option = document.createElement('option');
                    option.value = source;
                    option.textContent = source;
                    sourceFilter.appendChild(option);
                });

            } catch (error) {
                console.error('加载学科类别错误:', error);
            }
        }

        // 加载历史消息（支持多轮 QA）
        async function loadHistory() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/history/${currentSessionId}`);

                if (!response.ok) {
                    throw new Error('获取历史记录失败');
                }

                const data = await response.json();

                // 清空历史列表
                historyList.innerHTML = '';

                // 将历史记录按会话分组
                const sessionItem = document.createElement('div');
                sessionItem.className = 'history-item';
                sessionItem.innerHTML = `
                    <div class="history-question">会话 ${currentSessionId.slice(0, 8)}...</div>
                    <div class="history-answer">共 ${data.history.length} 轮对话</div>
                `;

                // 点击历史记录项显示整个会话
                sessionItem.addEventListener('click', () => {
                    // 清空现有聊天记录
                    clearChatHistory();

                    // 添加整个会话的 QA 对
                    data.history.forEach(item => {
                        addMessage('user', item.question); // 添加用户问题
                        addMessage('system', item.answer); // 添加系统回答
                    });

                    // 滚动到底部
                    scrollToBottom();
                });

                historyList.appendChild(sessionItem);

            } catch (error) {
                console.error('加载历史记录错误:', error);
            }
        }

        // 清除历史记录
        async function clearHistory() {
            if (!currentSessionId) return;

            if (!confirm('确定要清除所有历史记录吗？')) {
                return;
            }

            showLoading();
            try {
                const response = await fetch(`${API_BASE_URL}/api/history/${currentSessionId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('清除历史记录失败');
                }

                // 清空历史列表
                historyList.innerHTML = '';

                // 清空聊天历史
                clearChatHistory();

                // 添加欢迎消息
                chatHistory.innerHTML = `
                    <div class="message system-message">
                        <div class="message-header">
                            <div class="avatar">智</div>
                            <span>智能助手</span>
                        </div>
                        <div class="message-content">
                            历史记录已清除，有什么我可以帮您的吗？
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('清除历史记录错误:', error);
                alert('清除历史记录失败');
            } finally {
                hideLoading();
            }
        }

        // 清空聊天历史
        function clearChatHistory() {
            chatHistory.innerHTML = `
                <div class="message system-message">
                    <div class="message-header">
                        <div class="avatar">智</div>
                        <span>智能助手</span>
                    </div>
                    <div class="message-content">
                        您好！我是智能问答助手，有什么我可以帮您的吗？
                    </div>
                </div>
            `;
        }

        // 显示加载遮罩
        function showLoading() {
            loadingOverlay.style.visibility = 'visible';
        }

        // 隐藏加载遮罩
        function hideLoading() {
            loadingOverlay.style.visibility = 'hidden';
        }

        // 发送消息
        async function sendMessage() {
            const query = chatInput.value.trim();
            const filter = sourceFilter.value;

            if (!query || isResponseInProgress) return;

            // 重置输入框
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // 添加用户消息到聊天窗口
            addMessage('user', query);

            // 设置正在响应标志
            isResponseInProgress = true;

            // 添加正在输入指示器
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            chatHistory.appendChild(typingIndicator);

            // 滚动到底部
            scrollToBottom();

            try {
                // 发送查询请求
                const response = await fetch(`${API_BASE_URL}/api/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        source_filter: filter,
                        session_id: currentSessionId
                    })
                });

                if (!response.ok) {
                    throw new Error('查询失败');
                }

                const data = await response.json();

                // 移除输入指示器
                if (typingIndicator.parentNode) {
                    chatHistory.removeChild(typingIndicator);
                }

                // 如果需要流式输出，使用 WebSocket
                if (data.is_streaming) {
                    // 创建系统消息容器，但内容为空
                    const messageElement = document.createElement('div');
                    messageElement.className = 'message system-message';

                    const headerElement = document.createElement('div');
                    headerElement.className = 'message-header';
                    headerElement.innerHTML = `
                        <div class="avatar">智</div>
                        <span>智能助手</span>
                    `;

                    const contentElement = document.createElement('div');
                    contentElement.className = 'message-content';
                    contentElement.innerHTML = ''; // 初始化为空

                    messageElement.appendChild(headerElement);
                    messageElement.appendChild(contentElement);
                    chatHistory.appendChild(messageElement);

                    // 建立 WebSocket 连接进行流式输出
                    await handleStreamingResponse(query, filter, contentElement);
                } else {
                    // 直接添加格式化后的答案
                    addMessage('system', data.answer);
                }

                // 重新加载历史记录
                await loadHistory();

            } catch (error) {
                console.error('发送消息错误:', error);

                // 移除输入指示器
                if (typingIndicator.parentNode) {
                    chatHistory.removeChild(typingIndicator);
                }

                // 添加错误消息
                addMessage('system', `抱歉，发生错误: ${error.message}`);
            } finally {
                // 清除正在响应标志
                isResponseInProgress = false;

                // 滚动到底部
                scrollToBottom();
            }
        }

        // 处理流式响应
        async function handleStreamingResponse(query, filter, contentElement) {
            // 关闭现有连接
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.close();
            }

            return new Promise((resolve, reject) => {
                // WebSocket URL
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}${API_BASE_URL}/api/stream`;

                // 创建 WebSocket 连接
                socket = new WebSocket(wsUrl);

                let accumulatedContent = ''; // 累积流式内容

                // 连接建立时
                socket.onopen = function() {
                    console.log('WebSocket 连接已建立');

                    // 发送查询请求
                    socket.send(JSON.stringify({
                        query: query,
                        source_filter: filter,
                        session_id: currentSessionId
                    }));
                };

                // 接收消息时
                socket.onmessage = function(event) {
                    const data = JSON.parse(event.data);

                    switch (data.type) {
                        case 'start':
                            console.log('流式响应开始');
                            break;

                        case 'token':
                            // 追加 token 到内容
                            accumulatedContent += data.token;
                            // 使用 marked.js 解析 Markdown 格式
                            contentElement.innerHTML = marked.parse(accumulatedContent);
                            scrollToBottom();
                            break;

                        case 'end':
                            console.log('流式响应结束');
                            socket.close();
                            resolve();
                            break;

                        case 'error':
                            console.error('流式响应错误:', data.error);
                            contentElement.innerHTML += `<p>[错误: ${data.error}]</p>`;
                            socket.close();
                            reject(new Error(data.error));
                            break;
                    }
                };

                // 发生错误时
                socket.onerror = function(error) {
                    console.error('WebSocket 错误:', error);
                    contentElement.innerHTML += '<p>[连接错误]</p>';
                    reject(error);
                };

                // 连接关闭时
                socket.onclose = function() {
                    console.log('WebSocket 连接已关闭');
                    resolve();
                };
            });
        }

        // 添加消息到聊天窗口（支持 Markdown 格式）
        function addMessage(type, content) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${type === 'user' ? 'user-message' : 'system-message'}`;

            // 添加消息头部
            const headerElement = document.createElement('div');
            headerElement.className = 'message-header';

            if (type === 'user') {
                headerElement.innerHTML = `
                    <div class="avatar">用</div>
                    <span>我</span>
                `;
            } else {
                headerElement.innerHTML = `
                    <div class="avatar">智</div>
                    <span>智能助手</span>
                `;
            }

            const contentElement = document.createElement('div');
            contentElement.className = 'message-content';
            // 使用 marked.js 解析 Markdown 格式（支持换行和代码块）
            contentElement.innerHTML = marked.parse(content);

            messageElement.appendChild(headerElement);
            messageElement.appendChild(contentElement);
            chatHistory.appendChild(messageElement);

            // 滚动到底部
            scrollToBottom();
        }

        // 滚动到底部
        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
